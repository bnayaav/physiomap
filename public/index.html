<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioMap — BioDigital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060a14;--panel:#0d1526;--b1:#1a2e4a;--b2:#253d62;--accent:#00cfe8;--t1:#e2e8f0;--t2:#94a3b8;--t3:#4a6580}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,sans-serif;background:var(--bg);color:var(--t1);direction:rtl}
#app{display:flex;flex-direction:column;height:100dvh}

header{height:52px;background:var(--panel);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;gap:10px;z-index:10}
.logo{font-size:1rem;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px}
.sub{font-size:.68rem;color:var(--t3);border-right:1px solid var(--b1);padding-right:8px;margin-right:2px}
#patInp{background:#121e32;border:1px solid var(--b1);border-radius:6px;color:var(--t1);
  font-size:.82rem;padding:5px 10px;outline:none;direction:rtl;width:150px;transition:border .2s}
#patInp:focus{border-color:var(--accent)}
#patInp::placeholder{color:var(--t3)}
#mmb{display:none;background:#121e32;border:1px solid var(--b1);color:var(--t2);
  border-radius:6px;padding:6px 11px;font-size:1rem;cursor:pointer}

#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* LEFT */
#left{width:185px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--b1);
  padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.stitle{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.grow{display:flex;border:1px solid var(--b1);border-radius:7px;overflow:hidden}
.gbtn{flex:1;padding:7px 4px;background:transparent;border:none;color:var(--t3);
  cursor:pointer;font-size:.86rem;transition:all .2s}
.gbtn.on{background:rgba(0,207,232,.12);color:var(--accent);font-weight:600}
.mbtn{display:flex;align-items:center;gap:7px;width:100%;padding:8px 10px;
  background:transparent;border:1px solid transparent;border-radius:6px;
  color:var(--t2);cursor:pointer;font-size:.82rem;transition:all .18s;
  margin-bottom:3px;text-align:right}
.mbtn:hover{background:#121e32;border-color:var(--b1);color:var(--t1)}
.mbtn.on{background:#121e32;border-color:var(--b2);color:var(--t1)}
.mdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.mlbl{flex:1;text-align:right}
.mck{font-size:.72rem;color:#38c975;width:12px}
.qpts{display:flex;flex-wrap:wrap;gap:4px}
.qpt{padding:4px 7px;background:#121e32;border:1px solid var(--b1);border-radius:4px;
  color:var(--t3);font-size:.65rem;cursor:pointer;transition:all .15s;font-family:monospace;font-weight:600}
.qpt:hover,.qpt.on{border-color:var(--qc);color:var(--qc)}
.qpt.on{background:rgba(255,255,255,.04)}

/* BIODIGITAL */
#bdWrap{flex:1;position:relative;overflow:hidden}
#bdFrame{width:100%;height:100%;border:none;display:block}
#ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:14px;background:var(--bg);z-index:10;transition:opacity .6s}
#ov.gone{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border:3px solid var(--b1);border-top-color:var(--accent);
  border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.olt{font-size:.9rem;color:var(--t3)}
.ols{font-size:.75rem;color:#2a4060}

/* RIGHT */
#right{width:260px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--b1);
  overflow-y:auto;display:flex;flex-direction:column}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;text-align:center;padding:24px;color:var(--t3)}
.eico{font-size:3.5rem;opacity:.2}
.et{font-size:.92rem;color:var(--t2);font-weight:600}
.es{font-size:.8rem;line-height:1.65}
#pti{padding:14px;display:flex;flex-direction:column;gap:10px}
.ph{border-right:3px solid;padding-right:10px}
.pid{font-size:1.3rem;font-weight:800;font-family:monospace;line-height:1.1}
.phn{font-size:.9rem;font-weight:700;margin-top:2px}
.pen{font-size:.7rem;color:var(--t3);font-family:monospace}
.psy{font-size:.7rem;color:#2a4060;margin-top:1px}
.ic{background:#121e32;border-radius:6px;padding:9px 11px;border:1px solid var(--b1)}
.icl{font-size:.6rem;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.icc{font-size:.81rem;line-height:1.55;color:var(--t1)}
.irow{display:flex;gap:7px}
.im{flex:1;background:#121e32;border:1px solid var(--b1);border-radius:6px;padding:7px 9px}
.iml{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.imv{font-size:.82rem;font-weight:700}
.pbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pb{display:flex;gap:2px;height:6px}
.pbs{flex:1;border-radius:2px;background:#121e32;border:1px solid var(--b1)}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;border-radius:20px;font-size:.72rem;border:1px solid;background:transparent}
.warns{display:flex;flex-direction:column;gap:4px}
.warn{font-size:.77rem;color:#f87171;background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.2);border-radius:5px;padding:5px 9px}
.nsec{display:flex;flex-direction:column;gap:7px}
.nta{width:100%;background:#121e32;border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:.8rem;padding:9px 10px;resize:none;height:78px;outline:none;direction:rtl;line-height:1.5;transition:border .2s;font-family:system-ui}
.nta:focus{border-color:var(--accent)}
.nta::placeholder{color:#2a4060}
.savebtn{width:100%;padding:8px;background:rgba(0,207,232,.1);border:1px solid rgba(0,207,232,.3);border-radius:6px;color:var(--accent);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .2s}
.savebtn:hover{background:rgba(0,207,232,.2)}
.savebtn.ok{background:rgba(56,201,117,.1);border-color:rgba(56,201,117,.3);color:#38c975}

/* MOBILE */
#mbar{display:none;flex-shrink:0;background:var(--panel);border-top:1px solid var(--b1);
  padding:7px 8px;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center}
.mlb{padding:5px 9px;background:#121e32;border:1px solid var(--b1);border-radius:5px;
  color:var(--t3);font-size:.7rem;cursor:pointer;transition:all .18s}
.mlb.on{border-color:var(--mc);color:var(--mc);background:rgba(255,255,255,.04)}
#mib{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#000;border:none;border-radius:20px;
  padding:8px 20px;font-size:.84rem;font-weight:700;cursor:pointer;
  white-space:nowrap;z-index:6;box-shadow:0 4px 20px rgba(0,207,232,.4)}
#drw{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
#drw.open{display:flex}
#drwb{background:var(--panel);border-top:1px solid var(--b1);width:100%;max-height:78vh;
  overflow-y:auto;border-radius:16px 16px 0 0;padding:13px 13px 26px;position:relative}
.dh{width:36px;height:4px;background:var(--b1);border-radius:2px;margin:0 auto 12px}
.dcl{position:absolute;top:13px;left:13px;background:transparent;border:none;color:var(--t3);font-size:1.3rem;cursor:pointer}

@media(max-width:700px){
  #left,#right{display:none}
  #mbar{display:flex}
  #mmb{display:block}
  #mib{display:block}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo"><span>⚕</span><span>PhysioMap</span><span class="sub">BioDigital 3D</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <input id="patInp" type="text" placeholder="שם המטופל...">
    <button id="mmb" onclick="openDrw('layers')">☰</button>
  </div>
</header>

<div id="main">
  <aside id="left">
    <div>
      <div class="stitle">מגדר</div>
      <div class="grow">
        <button class="gbtn on" id="gm" onclick="setGender('male')">♂ גבר</button>
        <button class="gbtn" id="gf" onclick="setGender('female')">♀ אישה</button>
      </div>
    </div>
    <div>
      <div class="stitle">מערכת גוף</div>
      <div id="sceneBtns"></div>
    </div>
    <div>
      <div class="stitle">נקודות טריגר</div>
      <div class="qpts" id="qpts"></div>
    </div>
  </aside>

  <div id="bdWrap">
    <div id="ov">
      <div class="spin"></div>
      <div class="olt">טוען BioDigital Human...</div>
      <div class="ols" id="lst">מודל אנטומי מקצועי</div>
    </div>
    <iframe id="bdFrame" allowfullscreen allow="xr-spatial-tracking *"
      src="about:blank"></iframe>
    <button id="mib" onclick="openDrw('info')" style="display:none">פרטי נקודה ↑</button>
  </div>

  <aside id="right">
    <div class="empty" id="emp">
      <div class="eico">🎯</div>
      <div class="et">בחר נקודת טריגר</div>
      <div class="es">לחץ על שם נקודה<br>בצד שמאל<br>לפרטי טיפול</div>
    </div>
    <div id="pti" style="display:none"></div>
  </aside>
</div>

<div id="mbar"><div id="mlayers"></div></div>
</div>

<div id="drw" onclick="closeDrw(event)">
  <div id="drwb">
    <button class="dcl" onclick="closeDrw()">✕</button>
    <div class="dh"></div>
    <div id="drwc"></div>
  </div>
</div>

<script>
const DK = '8abed64a1cea795cb0b9fd2d7c65d3c00f19c748';
const PAID = 'o_264de3e5';

// BioDigital model IDs — using the exact published URL format
const MODELS = {
  male: {
    full:     '74hv',   // Male Complete Anatomy — your published model!
    muscles:  'production/maleAdult/male_muscular_system',
    skeleton: 'production/maleAdult/male_skeletal_system',
    vessels:  'production/maleAdult/male_cardiovascular_system',
    nerves:   'production/maleAdult/male_nervous_system',
  },
  female: {
    full:     'production/femaleAdult/female_region_anatomy',
    muscles:  'production/femaleAdult/female_muscular_system',
    skeleton: 'production/femaleAdult/female_skeletal_system',
    vessels:  'production/femaleAdult/female_cardiovascular_system',
    nerves:   'production/femaleAdult/female_nervous_system',
  }
};

const SLABELS = {
  full:    {lbl:'אנטומיה מלאה', color:'#00cfe8', em:'🫀'},
  muscles: {lbl:'שרירים',       color:'#ff6633', em:'💪'},
  skeleton:{lbl:'שלד',          color:'#e8d5b0', em:'🦴'},
  vessels: {lbl:'כלי דם',       color:'#ef4444', em:'🩸'},
  nerves:  {lbl:'עצבים',        color:'#9ee840', em:'⚡'},
};

const TPS = {
  TP_UPPER_TRAP:{id:'TP_UPPER_TRAP',nameHe:'Trapezius עליון',nameEn:'Upper Trapezius TP',system:'שריר טרפזיוס',color:'#f87171',pl:5,location:'אמצע הקו בין צוואר לכתף — טרפזיוס עליון',usage:'כאב עורף, כאבי ראש מתח, נוקשות כתף, כאב מופנה לאזמל',technique:'לחץ עמוק עם אגודל/מרפק. 30–60 שנ׳.',duration:'30–60 שנ׳',pressure:'עמוק',tags:['טרפזיוס','עורף'],warnings:['אסור בהריון!']},
  TP_SCM:{id:'TP_SCM',nameHe:'SCM — סטרנוקלידומסטואיד',nameEn:'Sternocleidomastoid TP',system:'שריר SCM — צוואר',color:'#fb923c',pl:2,location:'לאורך הצוואר, בין האוזן לעצם הבריח',usage:'כאבי ראש, מיגרנה, ורטיגו, טינטון',technique:'פינצ׳ עדין לאורך השריר. 20–40 שנ׳.',duration:'20–40 שנ׳',pressure:'עדין',tags:['צוואר','כאבי ראש'],warnings:['קרוב לעורק קרוטיד!']},
  TP_SUPRASPINATUS:{id:'TP_SUPRASPINATUS',nameHe:'Supraspinatus',nameEn:'Supraspinatus TP',system:'שרוול כתף',color:'#fbbf24',pl:5,location:'מעל קוץ השכמה, פוסה סופראספינאלית',usage:'כאב כתף עמוק, קשיי הרמה לצד, כאב לילי',technique:'לחץ עמוק מעל השכמה. 45–60 שנ׳.',duration:'45–60 שנ׳',pressure:'עמוק',tags:['כתף','שרוול כתף'],warnings:['לא אחרי ניתוח']},
  TP_INFRASPINATUS:{id:'TP_INFRASPINATUS',nameHe:'Infraspinatus',nameEn:'Infraspinatus TP',system:'שרוול כתף',color:'#fbbf24',pl:5,location:'מתחת לקוץ השכמה, פוסה אינפראספינאלית',usage:'כאב מופנה לכתף קדמי, הגבלת סיבוב פנימי',technique:'לחץ עמוק. 40–60 שנ׳.',duration:'40–60 שנ׳',pressure:'עמוק',tags:['כתף','שרוול כתף'],warnings:[]},
  TP_RHOMBOID:{id:'TP_RHOMBOID',nameHe:'Rhomboid',nameEn:'Rhomboid TP',system:'גב עליון',color:'#34d399',pl:4,location:'בין עמוד השדרה לקצה הפנימי של השכמה',usage:'כאב חד בין השכמות, כאב בנשימה עמוקה',technique:'לחץ עמוק עם מרפק. 30–60 שנ׳.',duration:'30–60 שנ׳',pressure:'עמוק',tags:['גב עליון','שכמות'],warnings:[]},
  TP_QL:{id:'TP_QL',nameHe:'Quadratus Lumborum',nameEn:'QL TP',system:'גב תחתון',color:'#ef4444',pl:6,location:'בין צלע 12 לכסל, לצד עמוד השדרה',usage:'כאב גב תחתון חריף, כאב בשינוי תנוחה',technique:'לחץ עמוק מאוד מרפק. 60–90 שנ׳.',duration:'60–90 שנ׳',pressure:'עמוק מאוד',tags:['גב תחתון','QL'],warnings:['זהירות כליות','זהירות דיסק']},
  TP_PIRIFORMIS:{id:'TP_PIRIFORMIS',nameHe:'Piriformis',nameEn:'Piriformis TP',system:'ישבן',color:'#ef4444',pl:6,location:'אמצע הקו בין זנב הסוס ל-Greater Trochanter',usage:'כאב ישבן, סיאטיקה מדומה, קרינה לרגל',technique:'לחץ עמוק מרפק. 60–90 שנ׳. שכיבה על הצד.',duration:'60–90 שנ׳',pressure:'עמוק מאוד',tags:['ירך','סיאטיקה','ישבן'],warnings:['עצב סיאטי קרוב!']},
  TP_GLUTEUS:{id:'TP_GLUTEUS',nameHe:'Gluteus Medius',nameEn:'Gluteus Medius TP',system:'ישבן',color:'#fb923c',pl:5,location:'שליש עליון של גלוטאוס מדיוס',usage:'כאב ישבן, כאב מופנה לגב תחתון ולירך',technique:'לחץ עמוק. 45–60 שנ׳.',duration:'45–60 שנ׳',pressure:'עמוק',tags:['ישבן','ירך'],warnings:[]},
  TP_ITB:{id:'TP_ITB',nameHe:'IT Band',nameEn:'IT Band TP',system:'צד חיצוני ירך',color:'#60a5fa',pl:5,location:'צד חיצוני ירך, אמצע הקו כסל–ברך',usage:"Runner's Knee, כאב ברך חיצוני, חיכוך IT Band",technique:'לחץ ישיר עם מרפק. 30–60 שנ׳.',duration:'30–60 שנ׳',pressure:'חזק',tags:['ברך','IT Band','ריצה'],warnings:[]},
  TP_VMO:{id:'TP_VMO',nameHe:'VMO — Vastus Medialis',nameEn:'VMO TP',system:'ירך פנימית',color:'#60a5fa',pl:5,location:'ירך פנימית תחתונה, מעל הברך',usage:'כאב ברך פנימי, Patellofemoral syndrome',technique:'לחץ עמוק עם אגודל. 30–45 שנ׳.',duration:'30–45 שנ׳',pressure:'עמוק',tags:['ברך','פיקה','VMO'],warnings:[]},
  TP_GASTROCNEMIUS:{id:'TP_GASTROCNEMIUS',nameHe:'Gastrocnemius',nameEn:'Gastrocnemius TP',system:'שוק',color:'#a78bfa',pl:4,location:'בטן השוק — חלק עליון-מרכזי',usage:'התכווצויות לילה, כאב עגל, כאב מאחורי הברך',technique:'לחץ ישיר עם אגודלות. 30–60 שנ׳.',duration:'30–60 שנ׳',pressure:'חזק',tags:['שוק','התכווצות'],warnings:[]},
  TP_PLANTAR:{id:'TP_PLANTAR',nameHe:'Plantar Fascia',nameEn:'Plantar Fascia TP',system:'כף רגל',color:'#a78bfa',pl:5,location:'עקב וקמרון כף הרגל',usage:'Plantar fasciitis, כאב עקב בבוקר',technique:'לחץ עמוק + גלגול כדור. 30–60 שנ׳.',duration:'30–60 שנ׳',pressure:'עמוק',tags:['עקב','Plantar Fasciitis'],warnings:[]},
};

const S={gender:'male',scene:'full',selKey:null,notes:{},timer:null};

function buildURL(gender, scene){
  const id = MODELS[gender][scene];
  const base = `https://human.biodigital.com/viewer/?id=${id}`;
  const params = [
    'ui-anatomy-descriptions=true',
    'ui-anatomy-labels=true',
    'ui-fullscreen=true',
    'ui-layers=true',
    'ui-nav=true',
    'ui-search=true',
    'ui-tools=true',
    'ui-info=true',
    'ui-menu=true',
    'ui-undo=true',
    'ui-zoom=true',
    'initial.none=true',
    'disable-scroll=false',
    `dk=${DK}`,
    `paid=${PAID}`,
  ].join('&');
  return `${base}&${params}`;
}

function loadBD(){
  const url = buildURL(S.gender, S.scene);
  const ov = document.getElementById('ov');
  ov.classList.remove('gone');
  document.getElementById('lst').textContent = 'טוען מודל אנטומי...';

  if(S.timer) clearTimeout(S.timer);
  const frame = document.getElementById('bdFrame');
  frame.src = '';
  setTimeout(()=>{ frame.src = url; }, 150);

  // Hide loading after 5 seconds regardless
  S.timer = setTimeout(()=> ov.classList.add('gone'), 8000);

  frame.onload = ()=>{
    setTimeout(()=> ov.classList.add('gone'), 2000);
    clearTimeout(S.timer);
  };
}

function setGender(g){
  S.gender=g;
  document.getElementById('gm').classList.toggle('on',g==='male');
  document.getElementById('gf').classList.toggle('on',g==='female');
  loadBD();
}
function setScene(sc){
  S.scene=sc;
  buildSceneBtns(); buildMlayers(); loadBD();
}

function selectPt(key){
  S.selKey=key;
  buildQpts();
  renderInfo(key);
  if(window.innerWidth<=700) openDrw('info');
  document.getElementById('mib').style.display='block';
}

function renderInfo(key){
  const tp=TPS[key]; if(!tp) return;
  document.getElementById('emp').style.display='none';
  const bars=Array.from({length:6},(_,i)=>`<div class="pbs" style="${i<tp.pl?'background:'+tp.color+';border-color:transparent':''}"></div>`).join('');
  const tags=tp.tags.map(t=>`<span class="tag" style="border-color:${tp.color}66;color:${tp.color}">${t}</span>`).join('');
  const warns=tp.warnings.map(w=>`<div class="warn">⚠ ${w}</div>`).join('');
  const note=S.notes[tp.id]||'';
  const html=`
    <div class="ph" style="border-color:${tp.color}">
      <div class="pid" style="color:${tp.color}">${tp.id}</div>
      <div class="phn">${tp.nameHe}</div>
      <div class="pen">${tp.nameEn}</div>
      <div class="psy">${tp.system}</div>
    </div>
    <div class="ic"><div class="icl">📍 מיקום</div><div class="icc">${tp.location}</div></div>
    <div class="ic"><div class="icl">🩺 אינדיקציות</div><div class="icc">${tp.usage}</div></div>
    <div class="ic"><div class="icl">✋ טכניקה</div><div class="icc">${tp.technique}</div></div>
    <div class="irow">
      <div class="im"><div class="iml">⏱ זמן</div><div class="imv">${tp.duration}</div></div>
      <div class="im"><div class="iml">💪 עוצמה</div><div class="imv">${tp.pressure}</div></div>
    </div>
    <div><div class="pbl">עוצמת לחיצה</div><div class="pb">${bars}</div></div>
    <div class="tags">${tags}</div>
    ${warns?`<div class="warns">${warns}</div>`:''}
    <div class="nsec">
      <div class="icl">📝 הערות למטופל</div>
      <textarea class="nta" id="nta" placeholder="הסבר למטופל...">${note}</textarea>
      <button class="savebtn" id="savebtn" onclick="saveNote()">💾 שמור הערה</button>
    </div>`;
  const el=document.getElementById('pti');
  el.innerHTML=html; el.style.cssText='display:flex;flex-direction:column;gap:10px;padding:14px';
  document.getElementById('drwc').innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">${html}</div>`;
}

function saveNote(){
  const tp=TPS[S.selKey]; if(!tp) return;
  const ta=document.getElementById('nta'); if(!ta) return;
  S.notes[tp.id]=ta.value;
  const b=document.getElementById('savebtn');
  if(b){b.textContent='✅ נשמר!';b.classList.add('ok');setTimeout(()=>{b.textContent='💾 שמור הערה';b.classList.remove('ok')},2000)}
}

function buildSceneBtns(){
  const c=document.getElementById('sceneBtns'); c.innerHTML='';
  Object.entries(SLABELS).forEach(([k,cfg])=>{
    const b=document.createElement('button');
    b.className='mbtn'+(S.scene===k?' on':'');
    b.innerHTML=`<span class="mdot" style="background:${S.scene===k?cfg.color:'#1a2e4a'}"></span><span>${cfg.em}</span><span class="mlbl">${cfg.lbl}</span><span class="mck">${S.scene===k?'✓':''}</span>`;
    b.onclick=()=>setScene(k);
    c.appendChild(b);
  });
}
function buildMlayers(){
  const c=document.getElementById('mlayers'); c.innerHTML='';
  Object.entries(SLABELS).forEach(([k,cfg])=>{
    const b=document.createElement('button');
    b.className='mlb'+(S.scene===k?' on':'');
    b.style.setProperty('--mc',cfg.color);
    b.textContent=cfg.em+' '+cfg.lbl;
    b.onclick=()=>setScene(k);
    c.appendChild(b);
  });
}
function buildQpts(){
  const c=document.getElementById('qpts'); c.innerHTML='';
  Object.entries(TPS).forEach(([k,tp])=>{
    const b=document.createElement('button');
    b.className='qpt'+(S.selKey===k?' on':'');
    b.style.setProperty('--qc',tp.color);
    b.textContent=tp.id.replace('TP_','');
    b.onclick=()=>selectPt(k);
    c.appendChild(b);
  });
}
function openDrw(type){
  if(type==='layers'){
    let h='<div style="display:flex;flex-direction:column;gap:7px">';
    Object.entries(SLABELS).forEach(([k,cfg])=>{
      h+=`<button class="mbtn${S.scene===k?' on':''}" onclick="setScene('${k}');closeDrw()"><span class="mdot" style="background:${cfg.color}"></span><span>${cfg.em}</span><span class="mlbl">${cfg.lbl}</span></button>`;
    });
    h+='</div>';
    document.getElementById('drwc').innerHTML=h;
  }
  document.getElementById('drw').classList.add('open');
}
function closeDrw(e){if(!e||e.target===document.getElementById('drw')) document.getElementById('drw').classList.remove('open')}

window.addEventListener('DOMContentLoaded',()=>{
  buildSceneBtns(); buildMlayers(); buildQpts(); loadBD();
});
</script>
</body>
</html>
