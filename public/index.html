<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioMap — BioDigital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a14;--panel:#0d1526;--b1:#1a2e4a;--b2:#253d62;
  --accent:#00cfe8;--t1:#e2e8f0;--t2:#94a3b8;--t3:#4a6580
}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:system-ui,sans-serif;background:var(--bg);color:var(--t1);direction:rtl}
#app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
header{height:52px;background:var(--panel);border-bottom:1px solid var(--b1);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;flex-shrink:0;gap:10px}
.logo{font-size:1rem;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo span.sub{font-size:.68rem;color:var(--t3);border-right:1px solid var(--b1);padding-right:8px;margin-right:2px}
#patInp{background:#121e32;border:1px solid var(--b1);border-radius:6px;
  color:var(--t1);font-size:.82rem;padding:5px 10px;outline:none;direction:rtl;
  width:150px;transition:border .2s}
#patInp:focus{border-color:var(--accent)}
#patInp::placeholder{color:var(--t3)}
#mobMenuBtn{display:none;background:#121e32;border:1px solid var(--b1);
  color:var(--t2);border-radius:6px;padding:6px 11px;font-size:1rem;cursor:pointer}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0}

/* LEFT PANEL */
#left{width:190px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--b1);
  padding:12px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.stitle{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:6px}
.grow{display:flex;border:1px solid var(--b1);border-radius:7px;overflow:hidden}
.gbtn{flex:1;padding:7px 4px;background:transparent;border:none;color:var(--t3);
  cursor:pointer;font-size:.86rem;transition:all .2s}
.gbtn.on{background:rgba(0,207,232,.12);color:var(--accent);font-weight:600}

/* Scene buttons */
.scene-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;
  background:transparent;border:1px solid transparent;border-radius:6px;
  color:var(--t2);cursor:pointer;font-size:.82rem;transition:all .18s;
  margin-bottom:3px;text-align:right}
.scene-btn:hover{background:#121e32;border-color:var(--b1);color:var(--t1)}
.scene-btn.on{background:#121e32;border-color:var(--b2);color:var(--t1)}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.slbl{flex:1;text-align:right}
.sck{font-size:.72rem;color:#38c975;width:12px}

/* Quick points */
.qpts{display:flex;flex-wrap:wrap;gap:4px}
.qpt{padding:4px 7px;background:#121e32;border:1px solid var(--b1);border-radius:4px;
  color:var(--t3);font-size:.65rem;cursor:pointer;transition:all .15s;font-family:monospace;font-weight:600}
.qpt:hover,.qpt.on{border-color:var(--qc);color:var(--qc)}
.qpt.on{background:rgba(255,255,255,.04)}

/* BIODIGITAL IFRAME */
#bdWrap{flex:1;position:relative;overflow:hidden;background:#060a14}
#bdFrame{width:100%;height:100%;border:none;display:block}
#bdLoading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;background:var(--bg);
  z-index:10;pointer-events:none}
.spin{width:44px;height:44px;border:3px solid var(--b1);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-t{font-size:.9rem;color:var(--t3)}
.load-s{font-size:.75rem;color:var(--b2)}

/* View controls */
#viewCtrl{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:5px;z-index:5}
.vcBtn{width:36px;height:36px;background:rgba(13,21,38,.88);border:1px solid var(--b1);
  border-radius:7px;color:var(--t2);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
  backdrop-filter:blur(4px)}
.vcBtn:hover{border-color:var(--accent);color:var(--accent)}
#viewLabel{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(13,21,38,.82);border:1px solid var(--b1);border-radius:20px;
  padding:4px 14px;font-size:.7rem;color:var(--t3);white-space:nowrap;pointer-events:none}

/* RIGHT PANEL */
#right{width:265px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--b1);
  overflow-y:auto;display:flex;flex-direction:column}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;text-align:center;padding:24px;color:var(--t3)}
.eico{font-size:3.5rem;opacity:.2}
.et{font-size:.92rem;color:var(--t2);font-weight:600}
.es{font-size:.8rem;line-height:1.65}
#pti{padding:14px;display:flex;flex-direction:column;gap:10px}
.phead{border-right:3px solid;padding-right:10px}
.pid{font-size:1.3rem;font-weight:800;font-family:monospace;line-height:1.1}
.phname{font-size:.9rem;font-weight:700;margin-top:2px}
.pename{font-size:.7rem;color:var(--t3);font-family:monospace}
.psys{font-size:.7rem;color:#2a4060;margin-top:1px}
.ic{background:#121e32;border-radius:6px;padding:9px 11px;border:1px solid var(--b1)}
.icl{font-size:.6rem;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.icc{font-size:.81rem;line-height:1.55;color:var(--t1)}
.irow{display:flex;gap:7px}
.im{flex:1;background:#121e32;border:1px solid var(--b1);border-radius:6px;padding:7px 9px}
.iml{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.imv{font-size:.82rem;font-weight:700}
.pbl{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.pb{display:flex;gap:2px;height:6px}
.pbs{flex:1;border-radius:2px;background:#121e32;border:1px solid var(--b1)}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;border-radius:20px;font-size:.72rem;border:1px solid;background:transparent}
.warns{display:flex;flex-direction:column;gap:4px}
.warn{font-size:.77rem;color:#f87171;background:rgba(248,113,113,.07);
  border:1px solid rgba(248,113,113,.2);border-radius:5px;padding:5px 9px}
.nsec{display:flex;flex-direction:column;gap:7px}
.nta{width:100%;background:#121e32;border:1px solid var(--b1);border-radius:6px;
  color:var(--t1);font-size:.8rem;padding:9px 10px;resize:none;height:78px;
  outline:none;direction:rtl;line-height:1.5;transition:border .2s;font-family:system-ui}
.nta:focus{border-color:var(--accent)}
.nta::placeholder{color:#2a4060}
.sbtn{width:100%;padding:8px;background:rgba(0,207,232,.1);
  border:1px solid rgba(0,207,232,.3);border-radius:6px;
  color:var(--accent);font-size:.86rem;font-weight:700;cursor:pointer;transition:all .2s}
.sbtn:hover{background:rgba(0,207,232,.2)}
.sbtn.ok{background:rgba(56,201,117,.1);border-color:rgba(56,201,117,.3);color:#38c975}

/* MOBILE */
#mbar{display:none;flex-shrink:0;background:var(--panel);border-top:1px solid var(--b1);
  padding:7px 8px;gap:4px;align-items:center;flex-wrap:wrap;justify-content:center}
.mlbtn{padding:5px 9px;background:#121e32;border:1px solid var(--b1);
  border-radius:5px;color:var(--t3);font-size:.7rem;cursor:pointer;transition:all .18s}
.mlbtn.on{border-color:var(--mc);color:var(--mc);background:rgba(255,255,255,.04)}
#mInfoBtn{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  background:var(--accent);color:#000;border:none;border-radius:20px;
  padding:8px 20px;font-size:.84rem;font-weight:700;cursor:pointer;
  white-space:nowrap;z-index:6;box-shadow:0 4px 20px rgba(0,207,232,.4)}

/* DRAWER */
#drw{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:none;align-items:flex-end}
#drw.open{display:flex}
#drwb{background:var(--panel);border-top:1px solid var(--b1);width:100%;max-height:78vh;
  overflow-y:auto;border-radius:16px 16px 0 0;padding:13px 13px 26px;position:relative}
.dh{width:36px;height:4px;background:var(--b1);border-radius:2px;margin:0 auto 12px}
.dcl{position:absolute;top:13px;left:13px;background:transparent;border:none;
  color:var(--t3);font-size:1.3rem;cursor:pointer}

@media(max-width:700px){
  #left,#right{display:none}
  #mbar{display:flex}
  #mobMenuBtn{display:block}
  #mInfoBtn{display:block}
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div id="app">

<header>
  <div class="logo">
    <span>⚕</span>
    <span>PhysioMap</span>
    <span class="sub">BioDigital 3D</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <input id="patInp" type="text" placeholder="שם המטופל...">
    <button id="mobMenuBtn" onclick="openDrawer('layers')">☰</button>
  </div>
</header>

<div id="main">

  <!-- LEFT -->
  <aside id="left">
    <div>
      <div class="stitle">מגדר</div>
      <div class="grow">
        <button class="gbtn on" id="gm" onclick="setGender('male')">♂ גבר</button>
        <button class="gbtn" id="gf" onclick="setGender('female')">♀ אישה</button>
      </div>
    </div>

    <div>
      <div class="stitle">שכבות גוף</div>
      <div id="sceneBtns"></div>
    </div>

    <div>
      <div class="stitle">נקודות טריגר</div>
      <div class="qpts" id="qpts"></div>
    </div>
  </aside>

  <!-- BIODIGITAL -->
  <div id="bdWrap">
    <div id="bdLoading">
      <div class="spin"></div>
      <div class="load-t">טוען BioDigital Human...</div>
      <div class="load-s">מודל אנטומי מקצועי</div>
    </div>

    <iframe id="bdFrame"
      src="about:blank"
      allowfullscreen
      allow="xr-spatial-tracking">
    </iframe>

    <div id="viewLabel">לחץ על כל חלק גוף לפרטים</div>

    <div id="viewCtrl">
      <button class="vcBtn" onclick="bdCmd('camera.reset')" title="איפוס מצלמה">⌂</button>
      <button class="vcBtn" onclick="setView('front')" title="קדמי">▶</button>
      <button class="vcBtn" onclick="setView('back')" title="אחורי">◀</button>
      <button class="vcBtn" onclick="setView('side')" title="צד">↔</button>
      <button class="vcBtn" onclick="setView('top')" title="מלמעלה">↑</button>
    </div>

    <button id="mInfoBtn" style="display:none" onclick="openDrawer('info')">
      פרטי נקודה ↑
    </button>
  </div>

  <!-- RIGHT -->
  <aside id="right">
    <div class="empty" id="emp">
      <div class="eico">🎯</div>
      <div class="et">בחר נקודת טריגר</div>
      <div class="es">לחץ על נקודה בצד שמאל<br>או על הגוף ישירות</div>
    </div>
    <div id="pti" style="display:none"></div>
  </aside>

</div>

<!-- MOBILE BOTTOM -->
<div id="mbar"><div id="mlayers"></div></div>
</div>

<!-- MOBILE DRAWER -->
<div id="drw" onclick="closeDrw(event)">
  <div id="drwb">
    <button class="dcl" onclick="closeDrw()">✕</button>
    <div class="dh"></div>
    <div id="drwc"></div>
  </div>
</div>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
const S = {
  gender: 'male',
  scene: 'full',
  selKey: null,
  notes: {},
  human: null,
  bdReady: false,
};

// ═══════════════════════════════════════
// LOAD BIODIGITAL
// ═══════════════════════════════════════
function loadBioDigital() {
  const sceneId = SCENES[S.gender][S.scene];
  const url = `https://human.biodigital.com/widget/?id=${sceneId}&dk=${API_KEY}` +
    `&ui-anatomy-descriptions=true` +
    `&ui-fullscreen=false` +
    `&ui-zoom=true` +
    `&ui-pan=true` +
    `&ui-rotate=true` +
    `&bgstatic=0a0e1a` +
    `&lang=en`;

  document.getElementById('bdFrame').src = url;
  document.getElementById('bdLoading').style.display = 'flex';
  S.bdReady = false;
  S.human = null;

  // Wait for iframe then init API
  document.getElementById('bdFrame').onload = () => {
    setTimeout(initHumanAPI, 1500);
  };
}

function initHumanAPI() {
  try {
    S.human = new HumanAPI('bdFrame');

    S.human.on('human.ready', () => {
      S.bdReady = true;
      document.getElementById('bdLoading').style.display = 'none';
      console.log('BioDigital ready');
      // If a point was selected before load, apply it
      if (S.selKey) highlightObjects(S.selKey);
    });

    // Click on anatomy object
    S.human.on('object.picked', (data) => {
      if (data && data.objectId) {
        console.log('Picked:', data.objectId, data.objectName);
        document.getElementById('viewLabel').textContent =
          (data.objectName || data.objectId) + ' — לחץ על נקודה בפנל שמאל לטיפול';
      }
    });

    // Loading progress
    S.human.on('human.progress', (data) => {
      const el = document.querySelector('.load-s');
      if (el) el.textContent = `טוען... ${Math.round((data.progress||0)*100)}%`;
    });

  } catch(e) {
    console.log('BioDigital API init error:', e);
    document.getElementById('bdLoading').style.display = 'none';
  }
}

// ═══════════════════════════════════════
// HIGHLIGHT OBJECTS IN BIODIGITAL
// ═══════════════════════════════════════
function highlightObjects(key) {
  const tp = TPS[key];
  if (!tp || !S.human || !S.bdReady) return;

  // Isolate the relevant muscles
  if (tp.bdObjects && tp.bdObjects.length) {
    // Show only these objects
    S.human.send('scene.info', {}, (info) => {
      // Reset all first
      S.human.send('scene.restoreColors', {});
    });

    // Highlight with color
    tp.bdObjects.forEach(objName => {
      S.human.send('scene.setColor', {
        objects: objName,
        color: { r: hexToRgb(tp.color).r / 255, g: hexToRgb(tp.color).g / 255, b: hexToRgb(tp.color).b / 255 }
      });
    });

    // Fly camera to area
    if (tp.bdCamera) {
      S.human.camera.flyTo({
        eye: tp.bdCamera.eye,
        look: tp.bdCamera.look,
        velocity: 15,
      });
    }
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function bdCmd(cmd, params) {
  if (S.human && S.bdReady) {
    S.human.send(cmd, params || {});
  }
}

// ═══════════════════════════════════════
// CAMERA VIEWS
// ═══════════════════════════════════════
function setView(v) {
  const views = {
    front: { eye:{x:0,y:80,z:450}, look:{x:0,y:80,z:0}, velocity:15 },
    back:  { eye:{x:0,y:80,z:-450}, look:{x:0,y:80,z:0}, velocity:15 },
    side:  { eye:{x:450,y:80,z:0}, look:{x:0,y:80,z:0}, velocity:15 },
    top:   { eye:{x:0,y:500,z:10}, look:{x:0,y:80,z:0}, velocity:15 },
  };
  const labels = { front:'תצוגה קדמית', back:'תצוגה אחורית', side:'תצוגה צדדית', top:'תצוגה מלמעלה' };
  document.getElementById('viewLabel').textContent = labels[v] || '';

  if (S.human && S.bdReady) {
    S.human.camera.flyTo(views[v]);
  }
}

// ═══════════════════════════════════════
// GENDER & SCENE
// ═══════════════════════════════════════
function setGender(g) {
  S.gender = g;
  document.getElementById('gm').classList.toggle('on', g==='male');
  document.getElementById('gf').classList.toggle('on', g==='female');
  loadBioDigital();
}

function setScene(sc) {
  S.scene = sc;
  buildSceneBtns();
  buildMlayers();
  loadBioDigital();
}

// ═══════════════════════════════════════
// SELECT TRIGGER POINT
// ═══════════════════════════════════════
function selectPt(key) {
  S.selKey = key;
  buildQpts();
  renderInfo(key);
  highlightObjects(key);

  if (window.innerWidth <= 700) openDrawer('info');
  document.getElementById('mInfoBtn').style.display = 'block';
}

// ═══════════════════════════════════════
// RENDER INFO PANEL
// ═══════════════════════════════════════
function renderInfo(key) {
  const tp = TPS[key];
  if (!tp) return;
  document.getElementById('emp').style.display = 'none';
  const bars = Array.from({length:6},(_,i) =>
    `<div class="pbs" style="${i<tp.pl?'background:'+tp.color+';border-color:transparent':''}"></div>`
  ).join('');
  const tags = tp.tags.map(t=>`<span class="tag" style="border-color:${tp.color}66;color:${tp.color}">${t}</span>`).join('');
  const warns = tp.warnings.map(w=>`<div class="warn">⚠ ${w}</div>`).join('');
  const note = S.notes[tp.id] || '';
  const html = `
    <div class="phead" style="border-color:${tp.color}">
      <div class="pid" style="color:${tp.color}">${tp.id}</div>
      <div class="phname">${tp.nameHe}</div>
      <div class="pename">${tp.nameEn}</div>
      <div class="psys">${tp.system}</div>
    </div>
    <div class="ic"><div class="icl">📍 מיקום</div><div class="icc">${tp.location}</div></div>
    <div class="ic"><div class="icl">🩺 אינדיקציות</div><div class="icc">${tp.usage}</div></div>
    <div class="ic"><div class="icl">✋ טכניקה</div><div class="icc">${tp.technique}</div></div>
    <div class="irow">
      <div class="im"><div class="iml">⏱ זמן</div><div class="imv">${tp.duration}</div></div>
      <div class="im"><div class="iml">💪 עוצמה</div><div class="imv">${tp.pressure}</div></div>
    </div>
    <div><div class="pbl">עוצמת לחיצה</div><div class="pb">${bars}</div></div>
    <div class="tags">${tags}</div>
    ${warns ? `<div class="warns">${warns}</div>` : ''}
    <div class="nsec">
      <div class="icl">📝 הערות למטופל</div>
      <textarea class="nta" id="nta" placeholder="הסבר למטופל...">${note}</textarea>
      <button class="sbtn" id="sbtn" onclick="saveNote()">💾 שמור הערה</button>
    </div>`;

  const el = document.getElementById('pti');
  el.innerHTML = html;
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  el.style.gap = '10px';
  el.style.padding = '14px';

  document.getElementById('drwc').innerHTML =
    `<div style="display:flex;flex-direction:column;gap:10px">${html}</div>`;
}

function saveNote() {
  const tp = TPS[S.selKey]; if (!tp) return;
  const ta = document.getElementById('nta'); if (!ta) return;
  S.notes[tp.id] = ta.value;
  const btn = document.getElementById('sbtn');
  if (btn) {
    btn.textContent = '✅ נשמר!';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '💾 שמור הערה'; btn.classList.remove('ok'); }, 2000);
  }
}

// ═══════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════
function buildSceneBtns() {
  const c = document.getElementById('sceneBtns'); c.innerHTML = '';
  Object.entries(SCENE_LABELS).forEach(([key, cfg]) => {
    const b = document.createElement('button');
    b.className = 'scene-btn' + (S.scene===key ? ' on' : '');
    b.innerHTML = `<span class="sdot" style="background:${S.scene===key?cfg.color:'#1a2e4a'}"></span>
      <span>${cfg.em}</span><span class="slbl">${cfg.lbl}</span>
      <span class="sck">${S.scene===key?'✓':''}</span>`;
    b.onclick = () => setScene(key);
    c.appendChild(b);
  });
}

function buildMlayers() {
  const c = document.getElementById('mlayers'); c.innerHTML = '';
  Object.entries(SCENE_LABELS).forEach(([key, cfg]) => {
    const b = document.createElement('button');
    b.className = 'mlbtn' + (S.scene===key ? ' on' : '');
    b.style.setProperty('--mc', cfg.color);
    b.textContent = cfg.em + ' ' + cfg.lbl;
    b.onclick = () => setScene(key);
    c.appendChild(b);
  });
}

function buildQpts() {
  const c = document.getElementById('qpts'); c.innerHTML = '';
  Object.entries(TPS).forEach(([key, tp]) => {
    const b = document.createElement('button');
    b.className = 'qpt' + (S.selKey===key ? ' on' : '');
    b.style.setProperty('--qc', tp.color);
    b.textContent = tp.id.replace('TP_','');
    b.onclick = () => selectPt(key);
    c.appendChild(b);
  });
}

// ═══════════════════════════════════════
// DRAWER
// ═══════════════════════════════════════
function openDrawer(type) {
  if (type === 'layers') {
    let h = '<div style="display:flex;flex-direction:column;gap:8px">';
    Object.entries(SCENE_LABELS).forEach(([key, cfg]) => {
      h += `<button class="scene-btn${S.scene===key?' on':''}" onclick="setScene('${key}');closeDrw()">
        <span class="sdot" style="background:${cfg.color}"></span>
        <span>${cfg.em}</span><span class="slbl">${cfg.lbl}</span>
      </button>`;
    });
    h += '</div>';
    document.getElementById('drwc').innerHTML = h;
  }
  document.getElementById('drw').classList.add('open');
}

function closeDrw(e) {
  if (!e || e.target === document.getElementById('drw')) {
    document.getElementById('drw').classList.remove('open');
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  buildSceneBtns();
  buildMlayers();
  buildQpts();
  loadBioDigital();
});
</script>
