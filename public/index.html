<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhysioMap 3D</title>

<!-- BioDigital API -->
<script src="https://developer.biodigital.com/builds/api/2/human-api.min.js"></script>

<style>
body {
  margin: 0;
  background: #08101f;
  color: white;
  font-family: Arial;
}

/* 🔥 כפתורים */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
  justify-content: center;
  background: #0d1528;
}

.toolbar button {
  background: #16233f;
  color: white;
  border: 1px solid #2c406b;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
}

.toolbar button:hover {
  background: #22345d;
}

/* 🧠 iframe */
#bodyWidget {
  width: 100%;
  height: calc(100vh - 80px);
  border: none;
}

/* 📍 פופאפ */
.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #16233f;
  padding: 15px;
  border-radius: 10px;
  max-width: 250px;
  display: none;
}
</style>
</head>

<body>

<!-- 🔥 כפתורים -->
<div class="toolbar">
  <button onclick="showLayer('Muscular System')">שרירים</button>
  <button onclick="hideLayer('Muscular System')">הסר שרירים</button>

  <button onclick="showLayer('Skeletal System')">שלד</button>
  <button onclick="hideLayer('Skeletal System')">הסר שלד</button>

  <button onclick="resetView()">איפוס</button>
</div>

<!-- 🧠 מודל -->
<iframe id="bodyWidget"
  src="https://human.biodigital.com/widget/?id=production/maleAdult/male_full&ui-fullscreen=true&ui-anatomy-descriptions=true&dk=8abed64a1cea795cb0b9fd2d7c65d3c00f19c748">
</iframe>

<!-- 📍 פופאפ -->
<div id="popup" class="popup"></div>

<script>
const human = new HumanAPI("bodyWidget");

// 🧠 כשהמודל נטען
human.on("ready", function () {
  console.log("מודל 3D מוכן");
});

// 🎯 הצגת שכבה
function showLayer(layerName) {
  human.send("scene.setLayer", {
    layer: layerName,
    visible: true
  });
}

// ❌ הסתרת שכבה
function hideLayer(layerName) {
  human.send("scene.setLayer", {
    layer: layerName,
    visible: false
  });
}

// 🔄 איפוס מצלמה
function resetView() {
  human.send("camera.reset");
}

// 📍 נקודות שלך (דוגמה - אתה מחליף בזה שלך)
const points = {
  "Biceps": "שריר היד הקדמי",
  "Heart": "לב - מערכת הדם",
  "Femur": "עצם הירך"
};

// 🧠 לחיצה על גוף
human.pick.on("picked", function(e) {
  const name = e.objectName;
  console.log("נלחץ:", name);

  const popup = document.getElementById("popup");

  if(points[name]) {
    popup.innerHTML = "<b>" + name + "</b><br>" + points[name];
    popup.style.display = "block";
  } else {
    popup.innerHTML = name;
    popup.style.display = "block";
  }
});
</script>

</body>
</html>
